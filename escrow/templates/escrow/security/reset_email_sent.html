{% extends "MAIN/base.html" %}

{% block content %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 500px; padding: 20px;">
        <i class="fas fa-envelope-open-text" style="font-size: 4rem; color: #27ae60; margin-bottom: 20px;"></i>
        <h2>Check Your Email</h2>
        <p style="color: #64748b; font-size: 1.1rem;">
            We've sent a PIN reset link to your inbox. It will expire in 15 minutes.
        </p>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #888;">
            Didn't receive it? Check your spam folder or <a href="{% url 'request_pin_reset' %}" style="color: #960ffa;">try again</a>.
        </p>
    </div>
</div>
{% endblock %}
