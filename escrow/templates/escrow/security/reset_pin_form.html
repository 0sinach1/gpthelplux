{% extends "MAIN/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2>Set New PIN</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Enter your new 4-digit security PIN.</p>
        
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" style="width: 100%; background: #960ffa; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; margin-top: 20px;">
                Update PIN
            </button>
        </form>
    </div>
</div>
{% endblock %}
