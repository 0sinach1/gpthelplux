{% extends "MAIN/base.html" %}

{% block content %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 500px; padding: 20px;">
        <i class="fas fa-paper-plane" style="font-size: 3rem; color: #960ffa; margin-bottom: 20px;"></i>
        <h2>Check your Inbox</h2>
        <p style="color: #64748b;">
            We've emailed you instructions for setting your password. The link will expire shortly.
        </p>
        <p style="color: #64748b; font-size: 0.9rem;">
            If you don't see an email, check your spam folder.
        </p>
        <a href="/login/" style="display: block; margin-top: 30px; color: #960ffa; text-decoration: none;">Return to Login</a>
    </div>
</div>
{% endblock %}
