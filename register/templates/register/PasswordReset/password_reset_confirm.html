{% extends "MAIN/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center; background: #f7f6fb;">
    <div style="background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2 style="text-align: center; margin-bottom: 20px; color: #1e293b;">Set New Password</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" style="width: 100%; background: #960ffa; color: white; padding: 12px; border: none; border-radius: 8px; margin-top: 20px; font-weight: 700;">
                Change Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
