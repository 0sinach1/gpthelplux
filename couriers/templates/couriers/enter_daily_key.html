
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxa | Staff Verification</title>
    <link rel="icon" type="image/png" sizes="50x50" href="{% static '/images/titlelogo.png' %}" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; min-height: 100vh; }
        .gate-card { max-width: 400px; width: 100%; margin: auto; border-radius: 12px; border: none; }
        .brand-accent { color: #960ffa; font-weight: bold; }
        .btn-verify { background-color: #960ffa; color: white; border-radius: 8px; }
        .btn-verify:hover { background-color: #7a0cc9; color: white; }
    </style>
</head>
<body>
    <div class="card gate-card shadow-lg p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Luxa<span class="brand-accent">.ng</span></h2>
            <p class="text-muted">Staff Registration Gate</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase">Enter Today's Access Key</label>
                <input type="text" name="daily_key" 
                       class="form-control form-control-lg text-center fw-bold" 
                       placeholder="Enter 6-digit code" 
                       maxlength="6" required autofocus>
                <div class="form-text mt-2 small text-center">
                    Only authorized Luxa staff with today's key can register.
                </div>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-verify btn-lg">Verify & Continue</button>
            </div>
        </form>
    </div>
</body>
</html>
