<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Staff Authentication | Luxa</title>
    <style>
        :root {
            --luxa-purple: #924ae4;
            --luxa-black: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* CLEAN WHITE BACKGROUND */
            color: var(--luxa-black);
        }

        .auth-wrapper {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            height: 120px; /* ENLARGED LOGO */
            width: auto;
            margin-bottom: 20px;
        }

        .title-text {
            font-weight: 800; 
            color: var(--luxa-black); 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.4rem;
        }

        .auth-card {
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            /* Purple accent border at the top */
            border-top: 5px solid var(--luxa-purple); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .form-input {
            width: 100%; 
            padding: 14px; 
            border: 1px solid #e0e0e0; 
            border-radius: 6px; 
            background-color: #f9f9f9;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Purple accent on input focus */
        .form-input:focus {
            outline: none;
            border-color: var(--luxa-purple);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(146, 74, 228, 0.1);
        }

        .login-btn {
            width: 100%; 
            padding: 14px; 
            background-color: var(--luxa-black); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }

        .login-btn:hover {
            background-color: #333;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-box {
            color: #d32f2f; 
            background-color: #ffebee; 
            padding: 12px; 
            border-radius: 6px; 
            margin-top: 20px; 
            font-size: 0.85rem; 
            text-align: center;
            border-left: 4px solid #d32f2f;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    
    <div class="header-section">
        <img src="/static/images/LUXA_Logo.png" alt="Luxa Logo" class="brand-logo">
        <h1 class="title-text">CMS Access key Staff Auth</h1>
    </div>

    <div class="auth-card">
        <form method="POST" action="{% url 'monitor_login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">USERNAME</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label class="form-label">PASSWORD</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">
                Log In
            </button>

            {% if error_message %}
            <div class="error-box">
                {{ error_message }}
            </div>
            {% endif %}
        </form>
    </div>

    <p style="margin-top: 30px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">
        Luxa © 2026 | Internal Access Only
    </p>
</div>

</body>
</html>
