<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Luxa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --luxa-purple: #960ffa;
            --luxa-dark: #1e293b;
            --text-light: #64748b;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background-color: #8b8b8b;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
            padding: 40px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .error-icon {
            font-size: 5rem;
            color: #fca5a5; /* A soft red to indicate a system error */
            margin-bottom: 20px;
            line-height: 1;
        }
        .error-code {
            font-size: 4rem;
            font-weight: 900;
            color: #ef4444; /* Standard error red */
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--luxa-dark);
            margin: 15px 0 10px 0;
        }
        .error-message {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--luxa-dark);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 41, 59, 0.2);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-icon">
            <i class="bi bi-hdd-network"></i>
        </div>
        <h1 class="error-code">500</h1>
        <h2 class="error-title">Our servers are taking a quick nap.</h2>
        <p class="error-message">
            Something went wrong on our end. Our engineering team has been notified and we are working to fix the issue as quickly as possible.
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-arrow-clockwise"></i> Try Again
        </a>
    </div>

</body>
</html>
