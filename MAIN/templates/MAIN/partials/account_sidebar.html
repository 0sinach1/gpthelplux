{% load static %}

<!-- ── Desktop Sidebar ── -->
<aside class="account-sidebar dashboard-sidebar">
  <h2 class="sidebar-heading">Account</h2>

  <nav>
    <a href="{% url 'customerpage' %}"
       class="sidebar-nav-item {% if active_nav == 'overview' %}active{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
      </svg>
      Overview
    </a>

    <a href="{% url 'customer_orders' %}"
       class="sidebar-nav-item {% if active_nav == 'my_orders' %}active{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
      </svg>
      My Orders
    </a>

    <a href="{% url 'wishlist' %}"
       class="sidebar-nav-item {% if active_nav == 'wishlist' %}active{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
      </svg>
      Wishlist
    </a>

    <a href="{% url 'kyc_info' %}"
       class="sidebar-nav-item {% if active_nav == 'addresses' %}active{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
      </svg>
      Addresses
    </a>

    {% if user.vendor_profile %}
      <p class="sidebar-section-label">For Vendors</p>

      <a href="{% url 'vendash' %}"
         class="sidebar-nav-item {% if active_nav == 'withdrawal' %}active{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Withdrawal
      </a>

      <a href="{% url 'vendor_product_orders' %}"
         class="sidebar-nav-item {% if active_nav == 'product_orders' %}active{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/>
        </svg>
        Product Orders
      </a>

      <a href="{% url 'manage_product' %}"
         class="sidebar-nav-item {% if active_nav == 'product_management' %}active{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 7.125C2.25 6.504 2.754 6 3.375 6h6c.621 0 1.125.504 1.125 1.125v3.75c0 .621-.504 1.125-1.125 1.125h-6a1.125 1.125 0 01-1.125-1.125v-3.75zM14.25 8.625c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v8.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 01-1.125-1.125v-8.25zM3.75 16.125c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125v2.25c0 .621-.504 1.125-1.125 1.125h-5.25a1.125 1.125 0 01-1.125-1.125v-2.25z"/>
        </svg>
        Product Management
      </a>
    {% endif %}
  </nav>

  {% if user.customer_profile.points %}
    <div class="sidebar-pts">
      <span>{{ user.customer_profile.points }}</span> pts
    </div>
  {% endif %}
</aside>

<!-- ── Mobile scroll tabs (replaces sidebar on mobile) ── -->
<div class="mobile-account-tabs">
  <button class="mobile-account-tab {% if active_nav == 'overview' %}active{% endif %}"
          onclick="window.location='{% url 'customerpage' %}'">Overview</button>
  <button class="mobile-account-tab {% if active_nav == 'my_orders' %}active{% endif %}"
          onclick="window.location='{% url 'customer_orders' %}'">My Orders</button>
  <button class="mobile-account-tab {% if active_nav == 'wishlist' %}active{% endif %}"
          onclick="window.location='{% url 'wishlist' %}'">Wishlist</button>
  <button class="mobile-account-tab {% if active_nav == 'addresses' %}active{% endif %}"
          onclick="window.location='{% url 'kyc_info' %}'">Addresses</button>
  {% if user.vendor_profile %}
    <button class="mobile-account-tab {% if active_nav == 'withdrawal' %}active{% endif %}"
            onclick="window.location='{% url 'vendash' %}'">Withdrawal</button>
    <button class="mobile-account-tab {% if active_nav == 'product_orders' %}active{% endif %}"
            onclick="window.location='{% url 'vendor_product_orders' %}'">Product Orders</button>
    <button class="mobile-account-tab {% if active_nav == 'product_management' %}active{% endif %}"
            onclick="window.location='{% url 'manage_product' %}'">Manage Products</button>
  {% endif %}
</div>
